name: Trading Bot Giornaliero

on:
  schedule:
    # Esegue lo script dal lunedì al venerdì (1-5) alle 20:17 UTC (22:17 in Italia)
    # Evita il minuto '00' per scongiurare ritardi o mancate attivazioni dovute a congestione su GitHub
    - cron: '17 20 * * 1-5'
  
  # Permette di avviare il workflow manualmente dal sito di GitHub per fare dei test
  workflow_dispatch:

jobs:
  esegui-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa le librerie necessarie
        run: pip install -r requirements.txt

      - name: Esegui il Bot
        env:
          # Le variabili segrete devono essere impostate nei "Secrets" di GitHub
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python main.py

      - name: Salva i dati generati su GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add registro_segnali.csv portafoglio_virtuale.csv iscritti.json || true
          git commit -m "🤖 Auto-aggiornamento dati bot" || true
          git push || true
